name: 🔄 Update Job Circulars Daily

on:
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm (Bangladesh time = UTC+6)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-circulars:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Run scraper
        run: python scripts/fetch_circulars.py

      - name: 📤 Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/circulars.json
          if git diff --staged --quiet; then
            echo "✅ No new circulars found. Nothing to commit."
          else
            ADDED=$(git diff --staged --stat | tail -1)
            git commit -m "🔄 Auto-update: new job circulars — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Pushed updated circulars.json"
          fi
